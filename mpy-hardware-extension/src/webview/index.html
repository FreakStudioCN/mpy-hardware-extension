<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src ${webviewCspSource} 'unsafe-inline'; script-src ${webviewCspSource} 'unsafe-inline';">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blockless</title>
    <style>
      /* VS Code Dark+ sidebar — ported from the Forge design reference.
         Only the .panel (header/quota/tabs/content/composer) is reproduced;
         the prototype's faux VS Code window chrome is dropped — this webview
         IS the sidebar. */
      :root {
        --vsc-sidebar: #181818;
        --vsc-sidebar-2: #1f1f1f;
        --vsc-input: #2a2a2b;
        --vsc-input-border: #3c3c40;
        --vsc-hover: #2a2d2e;
        --vsc-card: #202022;
        --vsc-card-border: #2c2c2e;
        --vsc-border: #2b2b2b;
        --vsc-border-soft: #ffffff14;
        --fg: #cccccc;
        --fg-bright: #ffffff;
        --fg-muted: #9d9d9d;
        --fg-dim: #6e6e6e;
        --accent: #0e7aff;
        --accent-hover: #2b8bff;
        --green: #3fb950;
        --yellow: #d3a50a;
        --red: #f14c4c;
        --cyan: #4ec9b0;
        --tok-comment: #6a9955;
        --tok-string: #ce9178;
        --tok-num: #b5cea8;
        --tok-kw: #569cd6;
        --tok-fn: #dcdcaa;
        --tok-const: #569cd6;
        --mono: ui-monospace, "Cascadia Code", "SF Mono", Menlo, Consolas, monospace;
        --ui: -apple-system, "Segoe UI", system-ui, sans-serif;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background: var(--vsc-sidebar); color: var(--fg);
        font-family: var(--ui); font-size: 13px;
        -webkit-font-smoothing: antialiased;
      }
      .panel { height: 100vh; display: flex; flex-direction: column; min-height: 0; }

      /* header */
      .panel-head { flex: 0 0 auto; padding: 10px 12px 8px; border-bottom: 1px solid var(--vsc-border); }
      .ph-row { display: flex; align-items: center; gap: 8px; }
      .ph-logo {
        width: 22px; height: 22px; border-radius: 6px; flex: 0 0 auto;
        background: linear-gradient(135deg, var(--accent), #0a5ed0);
        display: flex; align-items: center; justify-content: center; color: #fff;
      }
      .ph-text { min-width: 0; }
      .ph-title { font-size: 13px; font-weight: 600; color: var(--fg-bright); letter-spacing: .1px; }
      .ph-device { margin-top: 3px; max-width: 100%; background: var(--vsc-input); color: var(--fg); border: 1px solid var(--vsc-input-border); border-radius: 5px; padding: 2px 6px; font-family: var(--ui); font-size: 11px; outline: none; }
      .ph-device:focus { border-color: var(--accent); }
      .ph-grow { flex: 1; }

      /* quota */
      .quota { margin-top: 10px; }
      .quota-top { display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: var(--fg-muted); }
      .quota-top .num { font-family: var(--mono); color: var(--fg); }
      .quota-top .num b { color: var(--fg-bright); font-weight: 600; }
      .quota-bar { height: 4px; border-radius: 3px; background: #ffffff14; margin-top: 5px; overflow: hidden; }
      .quota-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width .5s ease, background .3s; }
      .quota.low .quota-fill { background: var(--yellow); }
      .quota.exhausted .quota-fill { background: var(--red); }
      .quota-warn { margin-top: 7px; font-size: 11px; display: none; align-items: center; gap: 6px;
        color: var(--yellow); background: #d3a50a14; border: 1px solid #d3a50a33; padding: 5px 8px; border-radius: 6px; }
      .quota.low .quota-warn, .quota.exhausted .quota-warn { display: flex; }
      .quota.exhausted .quota-warn { color: #ff7b72; background: #f14c4c14; border-color: #f14c4c33; }

      /* tabs */
      .tabs { display: flex; flex: 0 0 auto; border-bottom: 1px solid var(--vsc-border); padding: 0 6px; gap: 2px; }
      .tab { position: relative; padding: 9px 11px 8px; font-size: 12px; color: var(--fg-muted);
        background: transparent; border: 0; cursor: pointer; display: flex; align-items: center; gap: 6px;
        border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: var(--ui); }
      .tab:hover { color: var(--fg); }
      .tab.active { color: var(--fg-bright); border-bottom-color: var(--accent); }
      .tab .pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--green);
        box-shadow: 0 0 0 0 #3fb95066; animation: pulse 1.6s infinite; }
      .tab .newdot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
      @keyframes pulse { 0%{box-shadow:0 0 0 0 #3fb95066;} 70%{box-shadow:0 0 0 6px #3fb95000;} 100%{box-shadow:0 0 0 0 #3fb95000;} }

      .tabwrap { flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden; }
      .tabwrap::-webkit-scrollbar { width: 10px; }
      .tabwrap::-webkit-scrollbar-thumb { background: #ffffff1a; border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
      .tabwrap::-webkit-scrollbar-thumb:hover { background: #ffffff33; background-clip: padding-box; }
      .hidden { display: none !important; }

      .empty { padding: 40px 22px; text-align: center; color: var(--fg-dim); }
      .empty h4 { color: var(--fg-muted); font-size: 13px; font-weight: 600; margin: 0 0 5px; }
      .empty p { font-size: 12px; line-height: 1.5; margin: 0; }

      /* activity (card style) */
      .activity { padding: 10px 12px 18px; }
      .ev { margin-bottom: 7px; }
      .ev-card { border: 1px solid var(--vsc-card-border); background: var(--vsc-card); border-radius: 8px; overflow: hidden; }
      .ev-head { display: flex; align-items: flex-start; gap: 9px; padding: 9px 10px; }
      .ev-ico { width: 22px; height: 22px; border-radius: 6px; flex: 0 0 auto; display: flex; align-items: center; justify-content: center; font-size: 12px; }
      .ev-ico.thinking { background: #569cd622; color: #9cc7f0; }
      .ev-ico.skill { background: #a371f722; color: #c4a6fb; }
      .ev-ico.tool { background: #4ec9b022; color: #74d6c2; }
      .ev-ico.result { background: #3fb95022; color: #7ee08a; }
      .ev-ico.error { background: #f14c4c22; color: #ff9a9a; }
      .ev-main { flex: 1; min-width: 0; }
      .ev-label { font-size: 12.5px; color: var(--fg-bright); display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
      .ev-label .kind { font-size: 10px; text-transform: uppercase; letter-spacing: .6px; color: var(--fg-dim); font-weight: 600; }
      .ev-tool { font-family: var(--mono); font-size: 12px; color: var(--cyan); }
      .ev-think { font-size: 12.5px; color: #b9b9b9; line-height: 1.55; font-style: italic; white-space: pre-wrap; word-break: break-word; }
      .ev-sum { font-size: 12px; color: var(--fg-muted); margin-top: 3px; line-height: 1.45; word-break: break-word; }
      .ev-sum.is-error { color: #ff9a9a; }
      .ev-sum > div { margin: 3px 0; }
      .ev-sum .md-h { font-weight: 600; color: var(--fg-bright); margin: 7px 0 2px; }
      .ev-sum ul, .ev-sum ol { margin: 3px 0; padding-left: 18px; }
      .ev-sum li { margin: 1px 0; }
      .ev-sum strong { color: var(--fg-bright); font-weight: 600; }
      .ev-sum code { font-family: var(--mono); font-size: 11px; background: rgba(255,255,255,0.06); padding: 0 3px; border-radius: 3px; }
      .ev-card.ask { border-color: #a371f733; }
      .ask-row { display: flex; gap: 6px; margin-top: 8px; }
      .ask-input { flex: 1; min-width: 0; background: var(--vsc-input); border: 1px solid var(--vsc-input-border); color: var(--fg); border-radius: 6px; padding: 5px 8px; font-family: var(--ui); font-size: 12px; outline: none; }
      .ask-input:focus { border-color: var(--accent); }
      .ask-send { flex: 0 0 auto; background: var(--accent); color: #fff; border: 0; border-radius: 6px; padding: 0 12px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--ui); }
      .ask-send:hover:not(:disabled) { background: var(--accent-hover); }
      .ask-send:disabled { background: #3a3a3c; color: #8a8a8a; cursor: default; }
      .ask-options { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
      .ask-opt { background: var(--vsc-input); color: var(--fg); border: 1px solid var(--vsc-input-border); border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; font-family: var(--ui); }
      .plan-list { margin: 8px 0 0; padding-left: 16px; font-size: 12px; line-height: 1.6; }
      .plan-k { color: var(--fg-muted); }
      .plan-cost { margin-top: 8px; font-size: 12px; font-weight: 600; }
      .plan-summary { margin: 6px 0 2px; }
      .plan-edit { background: var(--vsc-input); color: var(--fg); border: 1px solid var(--vsc-input-border); font-weight: 500; }
      .plan-edit:hover:not(:disabled) { border-color: var(--accent); color: var(--fg-bright); background: var(--vsc-hover); }
      .ask-opt.plan-go { background: var(--accent, #2f6feb); color: #fff; border-color: transparent; }
      .ask-opt:hover:not(:disabled) { border-color: var(--accent); color: var(--fg-bright); }
      .ask-opt.chosen { background: var(--accent); color: #fff; border-color: var(--accent); }
      .ask-opt:disabled { opacity: .5; cursor: default; }
      .ask-answer { margin-top: 6px; font-size: 12px; color: #7ee08a; font-family: var(--mono); }

      /* code tab */
      .code-head, .serial-head { display: flex; align-items: center; gap: 8px; padding: 7px 12px;
        border-bottom: 1px solid var(--vsc-border); font-size: 11.5px; color: var(--fg-muted);
        position: sticky; top: 0; background: var(--vsc-sidebar); z-index: 2; }
      .code-head .file { font-family: var(--mono); color: var(--fg); display: flex; align-items: center; gap: 6px; }
      .code-head .grow { flex: 1; }
      .code-act { background: transparent; border: 0; color: var(--fg-muted); cursor: pointer; font-size: 11px; padding: 3px 7px; border-radius: 5px; font-family: var(--ui); }
      .code-act:hover { background: var(--vsc-hover); color: var(--fg); }
      .code-block { font-family: var(--mono); font-size: 12px; line-height: 18px; padding: 8px 0 12px; }
      .code-row { display: flex; }
      .code-row:hover { background: #ffffff07; }
      /* line-number gutter stays pinned while the code scrolls horizontally (editor-like) */
      .code-gut { position: sticky; left: 0; z-index: 1; background: var(--vsc-card); width: 42px; flex: 0 0 42px; text-align: right; padding-right: 14px; color: #5a5a5a; user-select: none; }
      .code-src { white-space: pre; padding-right: 14px; color: #d4d4d4; }
      .tok-comment { color: var(--tok-comment); } .tok-string { color: var(--tok-string); }
      .tok-num { color: var(--tok-num); } .tok-kw { color: var(--tok-kw); }
      .tok-fn { color: var(--tok-fn); } .tok-const { color: var(--tok-const); }
      /* code card in the activity feed (Claude Code / Cursor style: header + copy,
         horizontal scroll with a clean thin scrollbar, no wrapping) */
      .code-card-head { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-bottom: 1px solid var(--vsc-border-soft); background: #ffffff05; }
      .code-file { display: flex; align-items: center; gap: 6px; min-width: 0; font-family: var(--mono); font-size: 11.5px; color: var(--fg); }
      .code-file svg { flex: 0 0 auto; color: var(--fg-dim); }
      .code-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .code-copy { margin-left: auto; flex: 0 0 auto; background: transparent; border: 1px solid var(--vsc-input-border); color: var(--fg-muted); cursor: pointer; font-size: 11px; padding: 2px 9px; border-radius: 5px; font-family: var(--ui); }
      .code-copy:hover { background: var(--vsc-hover); color: var(--fg-bright); border-color: var(--accent); }
      .code-copy.done { color: var(--green); border-color: #3fb95055; }
      .ev-code { overflow: hidden; background: transparent; }
      .ev-code .code-block, .code-pre { max-height: 320px; overflow: auto; }
      .code-pre { margin: 0; padding: 8px 12px; font-family: var(--mono);
        font-size: 12px; line-height: 18px; color: #d4d4d4; white-space: pre; }
      .ev-code .code-block::-webkit-scrollbar, .code-pre::-webkit-scrollbar { width: 10px; height: 10px; }
      .ev-code .code-block::-webkit-scrollbar-thumb, .code-pre::-webkit-scrollbar-thumb { background: #ffffff1a; border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
      .ev-code .code-block::-webkit-scrollbar-thumb:hover, .code-pre::-webkit-scrollbar-thumb:hover { background: #ffffff33; background-clip: padding-box; }
      .ev-code .code-block::-webkit-scrollbar-corner, .code-pre::-webkit-scrollbar-corner { background: transparent; }
      /* in-feed "working" spinner — immediate feedback during a silent LLM call */
      .feed-spin { width: 13px; height: 13px; flex: 0 0 auto; border-radius: 50%; border: 1.6px solid #ffffff26; border-top-color: var(--accent); animation: spin .7s linear infinite; }

      /* serial tab */
      .serial-head .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--fg-dim); }
      .serial-head.live .dot { background: var(--green); box-shadow: 0 0 6px #3fb950; }
      .serial-head .baud { margin-left: auto; font-family: var(--mono); color: var(--fg-dim); }
      .serial-body { font-family: var(--mono); font-size: 12px; line-height: 1.65; padding: 8px 12px 24px; }
      .serial-line { display: flex; gap: 8px; white-space: pre-wrap; word-break: break-word; }
      .serial-line .txt { color: #cfcfcf; }
      .serial-line.boot .txt { color: #9d9d9d; }
      .serial-line.i2c .txt { color: var(--cyan); }
      .serial-line.alert .txt { color: #e6c07b; }
      .serial-line.ok .txt { color: #7ee08a; }

      /* wiring tab — component cards */
      .wiring { padding: 11px 12px 22px; }
      .wire-board { font-size: 11px; color: var(--fg-dim); margin-bottom: 11px; display: flex; align-items: center; gap: 7px; }
      .wire-board b { color: var(--fg); font-weight: 600; }
      .chip-board { font-family: var(--mono); font-size: 10.5px; color: var(--accent); background: #0e7aff1a; border: 1px solid #0e7aff33; padding: 2px 7px; border-radius: 5px; margin-left: auto; }
      .comp-card { border: 1px solid var(--vsc-card-border); background: var(--vsc-card); border-radius: 9px; margin-bottom: 9px; overflow: hidden; }
      .comp-top { display: flex; align-items: center; gap: 10px; padding: 10px 11px; }
      .comp-ico { width: 30px; height: 30px; border-radius: 8px; background: #ffffff0d; display: flex; align-items: center; justify-content: center; color: var(--accent); flex: 0 0 auto; }
      .comp-meta { flex: 1; min-width: 0; }
      .comp-name { font-size: 12.5px; font-weight: 600; color: var(--fg-bright); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .comp-part { font-size: 11px; color: var(--fg-muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .comp-driver { margin-left: auto; flex: 0 0 auto; font-family: var(--mono); font-size: 10px; color: var(--fg-dim); text-align: right; white-space: nowrap; }
      .comp-pins { border-top: 1px solid var(--vsc-border-soft); padding: 6px 11px 9px; }
      .pin-row { display: flex; align-items: center; gap: 9px; padding: 4px 0; }
      .pin-dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; }
      .pin-dot.signal { background: var(--accent); }
      .pin-dot.power { background: var(--red); }
      .pin-dot.ground { background: #6e6e6e; }
      .pin-sig { font-size: 12px; color: var(--fg); flex: 1; }
      .pin-to { font-family: var(--mono); font-size: 10.5px; color: var(--fg-dim); }
      .pin-badge { font-family: var(--mono); font-size: 11px; color: var(--fg-bright); background: #ffffff12; border: 1px solid var(--vsc-border-soft); padding: 1px 7px; border-radius: 5px; min-width: 46px; text-align: center; }
      .pin-badge.power { color: #ff9a9a; background: #f14c4c14; border-color: #f14c4c33; }
      .pin-badge.ground { color: #b0b0b0; }
      .wire-note { font-size: 11px; color: var(--yellow); background: #d3a50a14; border: 1px solid #d3a50a33; padding: 6px 9px; border-radius: 6px; margin-top: 4px; }

      /* composer */
      .composer { flex: 0 0 auto; border-top: 1px solid var(--vsc-border); padding: 10px 12px 12px; }
      .composer-box { border: 1px solid var(--vsc-input-border); background: var(--vsc-input); border-radius: 9px; padding: 9px 10px 8px; transition: border-color .15s, box-shadow .15s; }
      .composer-box.focused { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
      .composer-box.disabled { opacity: .55; }
      .composer textarea { width: 100%; border: 0; background: transparent; color: var(--fg); resize: none;
        font-family: var(--ui); font-size: 13px; line-height: 1.5; outline: none; min-height: 38px; max-height: 120px; }
      .composer textarea::placeholder { color: var(--fg-dim); }
      .composer-bar { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
      .composer-bar .ctx { font-size: 11px; color: var(--fg-dim); display: flex; align-items: center; gap: 5px; font-family: var(--mono); }
      .composer-bar .ctx .spin { width: 10px; height: 10px; flex: 0 0 auto; border-radius: 50%; border: 1.5px solid #ffffff26; border-top-color: var(--accent); display: none; }
      .composer-bar .ctx.thinking { color: var(--accent); }
      .composer-bar .ctx.thinking .spin { display: inline-block; animation: spin .7s linear infinite; }
      .composer-bar .ctx.error { color: var(--red); }
      @keyframes spin { to { transform: rotate(360deg); } }
      .composer-bar .grow { flex: 1; }
      .gen-btn { display: inline-flex; align-items: center; gap: 7px; height: 30px; padding: 0 13px;
        border: 0; border-radius: 7px; background: var(--accent); color: #fff; font-size: 12.5px; font-weight: 600;
        cursor: pointer; font-family: var(--ui); transition: background .15s; }
      .gen-btn:hover:not(:disabled) { background: var(--accent-hover); }
      .gen-btn:disabled { background: #3a3a3c; color: #8a8a8a; cursor: not-allowed; }
      .gen-btn.stop { background: #5a2b2b; color: #ffb3b3; }
      .gen-btn.stop:hover { background: #6e3434; }

      .fade-in { animation: fadeIn .28s ease both; }
      @keyframes fadeIn { from { transform: translateY(5px); } to { transform: none; } }
      @media (prefers-reduced-motion: reduce) { .fade-in { animation: none; } .composer-bar .ctx.thinking .spin { animation: none; } .feed-spin { animation: none; } }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="panel-head">
        <div class="ph-row">
          <div class="ph-logo">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><rect x="6" y="6" width="12" height="12" rx="2" stroke="currentColor" stroke-width="2"/><path d="M9.5 6V3M14.5 6V3M9.5 21v-3M14.5 21v-3M6 9.5H3M6 14.5H3M21 9.5h-3M21 14.5h-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </div>
          <div class="ph-text">
            <div class="ph-title">Blockless</div>
          </div>
          <div class="ph-grow"></div>
        </div>
        <div class="quota hidden" id="quota">
          <div class="quota-top"><span>Credits</span><span class="num"><b id="qUsed">0</b></span></div>
          <div class="quota-bar"><div class="quota-fill" id="qFill" style="width:0%"></div></div>
          <div class="quota-warn" id="qWarn">Running low on credits today.</div>
        </div>
      </div>

      <div class="tabs" id="tabs">
        <button class="tab active" data-tab="activity">Activity</button>
        <button class="tab" data-tab="serial">Serial</button>
        <button class="tab" data-tab="wiring">Wiring</button>
      </div>

      <div class="tabwrap">
        <!-- Activity -->
        <div class="view" data-view="activity">
          <div class="activity" id="activity"></div>
          <div class="empty" id="activityEmpty"><h4>Ready</h4><p>Describe what your device should do, then press Generate.</p></div>
        </div>
        <!-- Serial -->
        <div class="view hidden" data-view="serial">
          <div id="serialFilled" class="hidden">
            <div class="serial-head" id="serialHead"><span class="dot"></span><span>Serial monitor</span><span class="baud">115200</span></div>
            <div class="serial-body" id="serial"></div>
          </div>
          <div class="empty" id="serialEmpty"><h4>No output</h4><p>Device output streams here after flashing.</p></div>
        </div>
        <!-- Wiring -->
        <div class="view hidden" data-view="wiring">
          <div id="wiring"></div>
          <div class="empty" id="wiringEmpty"><h4>No wiring yet</h4><p>After codegen, the hardware layout maps to friendly signals and pins here.</p></div>
        </div>
      </div>

      <div class="composer">
        <div class="composer-box" id="composerBox">
          <textarea id="intent" placeholder="描述你的设备要做什么…（例如：温度超过 30 度时亮红灯）" rows="1"></textarea>
          <div class="composer-bar">
            <span class="ctx" id="statusWrap"><span class="spin"></span><span id="status">Ready</span></span>
            <span class="grow"></span>
            <button class="gen-btn" id="generate">Generate</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const vscode = typeof acquireVsCodeApi === "function" ? acquireVsCodeApi() : { postMessage: (m) => console.log(m), getState: () => null, setState: () => {} };
      const $ = (id) => document.getElementById(id);

      // ----- device list (from API, never hardcoded) -----
      // Board selection happens in the conversation (the agent recommends and
      // confirms via ask_user), not a header dropdown. Start is gated only by
      // quota; the board is decided in chat.
      function updateGenerateEnabled() {
        $("generate").disabled = (!running && quotaExhausted);
      }

      // ----- Python highlighter (ported from the design's highlight.js) -----
      const KW = new Set(["from","import","as","def","return","if","else","elif","while","for","in","not","and","or","class","with","try","except","finally","pass","break","continue","global","nonlocal","lambda","yield","raise","assert","del","is","await","async"]);
      const CONSTS = new Set(["None","True","False","self"]);
      const RE = /(#[^\n]*)|("""[\s\S]*?"""|'''[\s\S]*?''')|("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')|(\b\d[\d_]*\.?\d*\b)|([A-Za-z_][A-Za-z0-9_]*)(?=\s*\()|([A-Za-z_][A-Za-z0-9_]*)/g;
      function tokenize(code) {
        const out = []; let last = 0, m; RE.lastIndex = 0;
        while ((m = RE.exec(code)) !== null) {
          if (m.index > last) out.push({ text: code.slice(last, m.index), cls: "" });
          if (m[1]) out.push({ text: m[1], cls: "tok-comment" });
          else if (m[2] || m[3]) out.push({ text: m[2] || m[3], cls: "tok-string" });
          else if (m[4]) out.push({ text: m[4], cls: "tok-num" });
          else { const w = m[5] || m[6];
            const cls = KW.has(w) ? "tok-kw" : CONSTS.has(w) ? "tok-const" : (m[5] ? "tok-fn" : "");
            out.push({ text: w, cls }); }
          last = RE.lastIndex;
        }
        if (last < code.length) out.push({ text: code.slice(last), cls: "" });
        return out;
      }
      function highlightLines(code) {
        const lines = [[]];
        for (const t of tokenize(code)) {
          const parts = t.text.split("\n");
          for (let i = 0; i < parts.length; i++) {
            if (i > 0) lines.push([]);
            if (parts[i] !== "") lines[lines.length - 1].push({ text: parts[i], cls: t.cls });
          }
        }
        return lines;
      }

      // ----- tab state -----
      let activeTab = "activity";
      let running = false;
      let quotaExhausted = false;
      function setTab(name) {
        activeTab = name;
        document.querySelectorAll(".tab").forEach((t) => t.classList.toggle("active", t.dataset.tab === name));
        document.querySelectorAll(".view").forEach((v) => v.classList.toggle("hidden", v.dataset.view !== name));
        const tabBtn = document.querySelector('.tab[data-tab="' + name + '"]');
        const dot = tabBtn && tabBtn.querySelector(".newdot");
        if (dot) dot.remove();
      }
      function markNew(name) {
        if (activeTab === name) return;
        const tabBtn = document.querySelector('.tab[data-tab="' + name + '"]');
        if (tabBtn && !tabBtn.querySelector(".newdot") && !tabBtn.querySelector(".pulse")) {
          const d = document.createElement("span"); d.className = "newdot"; tabBtn.appendChild(d);
        }
      }
      document.querySelectorAll(".tab").forEach((t) => t.addEventListener("click", () => setTab(t.dataset.tab)));

      // ----- status / composer -----
      function setStatus(text, kind) {
        $("status").textContent = text;
        const w = $("statusWrap");
        w.classList.toggle("error", kind === "error");
        if (kind === "error") w.classList.remove("thinking");
      }
      // ----- liveness heartbeat -----
      // The spinner alone only says "the session hasn't ended". During a long,
      // silent LLM call (e.g. codegen) that's indistinguishable from a hang, so
      // show *what* the agent is doing plus a per-second active-work timer — that
      // moving timer + spinner is the "still alive" signal (Claude-Code style).
      // User-facing phase labels the agent emits (mirror of userVisibleToolPhase
      // in core/agent-backed-loop.ts — keep in sync; unknown phases fall back to
      // the generic "thinking" label, so any drift just degrades gracefully).
      const PHASE_LABELS = new Set([
        "读取开发板资料", "查找可用驱动", "读取驱动资料", "准备接线方案", "生成代码",
        "检查代码", "安装驱动包", "写入设备", "运行设备", "读取串口输出",
        "加载硬件规则", "读取工作区文件", "扫描设备",
      ]);
      // Active-work accounting: time spent waiting for the user (ask_user / plan /
      // deploy) must NOT inflate the timer. activeMs accumulates completed segments;
      // segStart marks the open segment (0 while paused).
      let activeMs = 0, segStart = 0, currentPhase = null, heartbeatTimer = null, awaitingUser = false;
      function activeElapsed() { return activeMs + (segStart ? Date.now() - segStart : 0); }
      function markActivity() { if (!segStart) segStart = Date.now(); } // resumes after a pause
      function pauseTimer() { if (segStart) { activeMs += Date.now() - segStart; segStart = 0; } }
      function fmtSecs(ms) { return Math.round(ms / 1000) + "s"; }
      function tickHeartbeat() {
        if (!running || awaitingUser) return;
        setStatus((currentPhase || "thinking") + "… " + fmtSecs(activeElapsed()));
        if (pendingCard) pendingCard.querySelector(".pending-label").textContent = pendingLabel + " " + fmtSecs(activeElapsed());
      }
      function setRunning(on) {
        running = on;
        const btn = $("generate");
        btn.textContent = on ? "Stop" : "Generate";
        btn.classList.toggle("stop", on);
        const w = $("statusWrap");
        w.classList.toggle("thinking", on);
        if (on) w.classList.remove("error");
        if (heartbeatTimer) { clearInterval(heartbeatTimer); heartbeatTimer = null; }
        if (on) {
          awaitingUser = false;
          activeMs = 0; segStart = Date.now(); currentPhase = null;
          heartbeatTimer = setInterval(tickHeartbeat, 1000);
        }
        updateGenerateEnabled();
      }
      $("generate").addEventListener("click", () => {
        if (running) { vscode.postMessage({ type: "cancel_session" }); setStatus("Stopping…"); return; }
        const intent = $("intent").value.trim();
        if (!intent) return;
        document.querySelectorAll(".newdot").forEach((d) => d.remove());
        document.querySelectorAll(".tab .pulse").forEach((p) => p.remove());
        currentThink = null;
        addUserMessage(intent);
        $("intent").value = "";
        $("intent").style.height = "auto";
        setTab("activity"); setRunning(true); setStatus("thinking…");
        // boardId "auto": the agent recommends a board and confirms it in chat.
        vscode.postMessage({ type: "start_session", intent, boardId: "auto" });
      });
      const ta = $("intent");
      ta.addEventListener("focus", () => $("composerBox").classList.add("focused"));
      ta.addEventListener("blur", () => $("composerBox").classList.remove("focused"));
      ta.addEventListener("input", () => { ta.style.height = "auto"; ta.style.height = Math.min(ta.scrollHeight, 120) + "px"; });

      // ----- Activity -----
      function isInternalActivity(text) {
        return /^ask_user:/.test(text) || /^Agent session /.test(text) || /^→\s*\w+/.test(text);
      }
      function classifyActivity(text) {
        if (/^→/.test(text)) return "tool";
        if (/fail|error|crash|exhaust/i.test(text)) return "error";
        if (/generated|finished|done|success|ready|complete/i.test(text)) return "result";
        if (/loaded skill|skill:/i.test(text)) return "skill";
        return "thinking";
      }
      const ICONS = { thinking: "•", skill: "•", tool: "•", result: "•", error: "•" };
      let currentThink = null; // open thinking card's text node, or null
      let currentCode = null;  // open streaming code card { pre, host, path }, or null
      // In-feed "working" indicator. After a user action (confirm plan / answer) the
      // next visible event is the LLM's first token, which can be seconds away — an
      // empty feed reads as a hang. setPending drops an immediate spinner card; the
      // heartbeat ticks its label, and any real content clears it.
      let pendingCard = null, pendingLabel = "";
      function setPending(label) {
        pendingLabel = label;
        if (!pendingCard) {
          $("activityEmpty").classList.add("hidden");
          pendingCard = document.createElement("div");
          pendingCard.className = "ev fade-in feed-pending";
          pendingCard.innerHTML = '<div class="ev-card"><div class="ev-head"><div class="ev-ico thinking"><span class="feed-spin"></span></div><div class="ev-main"><div class="ev-think pending-label"></div></div></div></div>';
          $("activity").appendChild(pendingCard);
        }
        pendingCard.querySelector(".pending-label").textContent = label;
        const w = $("activity").parentElement; w.scrollTop = w.scrollHeight;
      }
      function clearPending() { if (pendingCard) { pendingCard.remove(); pendingCard = null; } }
      // Render a safe subset of markdown (headings, bullets, ordered lists, bold,
      // inline code, paragraphs). HTML is escaped first, so LLM output cannot
      // inject markup — the regexes only re-introduce our own tags.
      function escapeHtml(s) {
        return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }
      function mdInline(s) {
        return s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
                .replace(/`([^`]+)`/g, "<code>$1</code>");
      }
      function renderMarkdown(src) {
        const out = []; let list = null;
        const close = () => { if (list) { out.push("</" + list + ">"); list = null; } };
        const open = (tag) => { if (list !== tag) { close(); out.push("<" + tag + ">"); list = tag; } };
        for (const raw of escapeHtml(src).split("\n")) {
          const t = raw.trim();
          if (!t) { close(); continue; }
          let m;
          if (m = t.match(/^#{1,6}\s+(.*)$/)) { close(); out.push('<div class="md-h">' + mdInline(m[1]) + "</div>"); continue; }
          if (m = t.match(/^\d+\.\s+(.*)$/)) { open("ol"); out.push("<li>" + mdInline(m[1]) + "</li>"); continue; }
          if (m = t.match(/^[-*](?!\*)\s*(.+)$/)) { open("ul"); out.push("<li>" + mdInline(m[1]) + "</li>"); continue; }
          close(); out.push("<div>" + mdInline(t) + "</div>");
        }
        close();
        return out.join("");
      }
      function addUserMessage(text) {
        $("activityEmpty").classList.add("hidden");
        const card = document.createElement("div");
        card.className = "ev fade-in";
        card.innerHTML = '<div class="ev-card"><div class="ev-head"><div class="ev-ico result">•</div><div class="ev-main"><div class="ev-label"><span class="kind">user</span></div><div class="ev-sum"></div></div></div></div>';
        card.querySelector(".ev-sum").textContent = text;
        $("activity").appendChild(card);
        const w = $("activity").parentElement;
        w.scrollTop = w.scrollHeight;
      }
      // The agent's final plain-text reply, shown as one clean result card. The
      // streamed mid-process reasoning is suppressed, so this is the only assistant
      // prose the user sees.
      function addSummary(text) {
        const t = (text == null ? "" : String(text)).trim();
        if (!t) return;
        currentThink = null; clearPending();
        $("activityEmpty").classList.add("hidden");
        const card = document.createElement("div");
        card.className = "ev fade-in";
        card.innerHTML = '<div class="ev-card"><div class="ev-head"><div class="ev-ico result">•</div><div class="ev-main"><div class="ev-label"><span class="kind">summary</span></div><div class="ev-sum"></div></div></div></div>';
        card.querySelector(".ev-sum").innerHTML = renderMarkdown(t);
        $("activity").appendChild(card);
        $("activity").parentElement.scrollTop = $("activity").parentElement.scrollHeight;
      }
      function addActivity(ev) {
        const text = (ev && typeof ev.text === "string") ? ev.text : JSON.stringify(ev);
        if (!text) return;
        if (isInternalActivity(text)) return;
        clearPending();
        $("activityEmpty").classList.add("hidden");
        const kind = classifyActivity(text);
        const scroll = () => { const w = $("activity").parentElement; w.scrollTop = w.scrollHeight; };
        // The agent streams thinking token-by-token (each delta is its own
        // trace_event). Coalesce consecutive thinking deltas into one growing
        // card instead of a new card per token.
        if (kind === "thinking") {
          if (currentThink) { currentThink.textContent += text; scroll(); return; }
          const card = document.createElement("div");
          card.className = "ev fade-in";
          card.innerHTML = '<div class="ev-card"><div class="ev-head"><div class="ev-ico thinking">•</div><div class="ev-main"><div class="ev-think"></div></div></div></div>';
          currentThink = card.querySelector(".ev-think");
          currentThink.textContent = text;
          $("activity").appendChild(card);
          scroll();
          return;
        }
        currentThink = null; // any non-thinking event closes the open stream
        const card = document.createElement("div");
        card.className = "ev fade-in";
        const ico = '<div class="ev-ico ' + kind + '">' + ICONS[kind] + "</div>";
        if (kind === "tool") {
          card.innerHTML = '<div class="ev-card"><div class="ev-head">' + ico + '<div class="ev-main"><div class="ev-label"><span class="kind">tool</span><span class="ev-tool"></span></div></div></div></div>';
          card.querySelector(".ev-tool").textContent = text.replace(/^→\s*/, "");
        } else {
          const cls = kind === "error" ? " is-error" : "";
          const label = kind === "result" ? "result" : kind === "skill" ? "skill" : "error";
          card.innerHTML = '<div class="ev-card"><div class="ev-head">' + ico + '<div class="ev-main"><div class="ev-label"><span class="kind">' + label + '</span></div><div class="ev-sum' + cls + '"></div></div></div></div>';
          card.querySelector(".ev-sum").innerHTML = renderMarkdown(text);
        }
        $("activity").appendChild(card);
        scroll();
      }

      // ----- ask_user (interactive prompt; pauses the agent until answered) -----
      function addAskPrompt(promptId, question, options) {
        currentThink = null;
        clearPending();
        $("activityEmpty").classList.add("hidden");
        setTab("activity");
        setStatus("Waiting for your answer…");
        const card = document.createElement("div");
        card.className = "ev fade-in";
        card.innerHTML = '<div class="ev-card ask"><div class="ev-head">' +
          '<div class="ev-ico skill">•</div>' +
          '<div class="ev-main"><div class="ev-label"><span class="kind">question</span></div>' +
          '<div class="ev-sum ask-q"></div>' +
          '<div class="ask-options"></div>' +
          '<div class="ask-row"><input class="ask-input" type="text" placeholder="Type your answer…"><button class="ask-send">Send</button></div>' +
          "</div></div></div>";
        card.querySelector(".ask-q").innerHTML = renderMarkdown(question);
        const input = card.querySelector(".ask-input");
        const send = card.querySelector(".ask-send");
        let answered = false;
        const submit = (raw) => {
          const answer = String(raw == null ? "" : raw).trim();
          if (!answer || answered) return;
          answered = true;
          vscode.postMessage({ type: "ui_prompt_response", promptId, answer });
          input.disabled = true; send.disabled = true; send.textContent = "Sent";
          card.querySelectorAll(".ask-opt").forEach((b) => { b.disabled = true; if (b.textContent === answer) b.classList.add("chosen"); });
          const a = document.createElement("div"); a.className = "ask-answer"; a.textContent = "• " + answer;
          card.querySelector(".ev-main").appendChild(a);
          awaitingUser = false; markActivity();
          setStatus("thinking…");
          setPending("thinking…");
        };
        // Choices presented in the conversation render as clickable options; the
        // text box stays for a free-form answer.
        const optHost = card.querySelector(".ask-options");
        if (Array.isArray(options) && options.length) {
          for (const opt of options) {
            const b = document.createElement("button");
            b.className = "ask-opt"; b.type = "button"; b.textContent = String(opt);
            b.addEventListener("click", () => submit(opt));
            optHost.appendChild(b);
          }
        }
        send.addEventListener("click", () => submit(input.value));
        input.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); submit(input.value); } });
        $("activity").appendChild(card);
        $("activity").parentElement.scrollTop = $("activity").parentElement.scrollHeight;
        setTimeout(() => input.focus(), 0);
      }

      // ----- build plan (confirmation gate before codegen spends credits) -----
      function addPlanPrompt(promptId, plan) {
        plan = plan || {};
        currentThink = null;
        clearPending();
        $("activityEmpty").classList.add("hidden");
        setTab("activity");
        setStatus("Review the plan…");
        const card = document.createElement("div");
        card.className = "ev fade-in";
        card.innerHTML = '<div class="ev-card ask"><div class="ev-head">' +
          '<div class="ev-ico skill">•</div>' +
          '<div class="ev-main"><div class="ev-label"><span class="kind">plan</span></div>' +
          '<div class="ev-sum">确认硬件选型后开始生成代码与接线图</div>' +
          '<div class="ev-sum plan-summary"></div>' +
          '<ul class="plan-list"></ul>' +
          '<div class="plan-cost"></div>' +
          '<div class="ask-row"><input class="ask-input plan-revise" type="text" placeholder="想改点什么？例如：把 OLED 换成 TFT、再加一个蜂鸣器…"><button class="ask-send plan-edit" type="button">修改计划</button></div>' +
          '<div class="ask-options"><button class="ask-opt plan-go" type="button">确认生成</button><button class="ask-opt plan-cancel" type="button">取消</button></div>' +
          "</div></div></div>";
        // Model-written narrative (optional), rendered above the structured rows.
        const summaryEl = card.querySelector(".plan-summary");
        if (typeof plan.summary === "string" && plan.summary.trim()) summaryEl.innerHTML = renderMarkdown(plan.summary.trim());
        else summaryEl.remove();
        const rows = [];
        if (plan.boardId) rows.push(["设备", plan.boardId]);
        if (Array.isArray(plan.capabilities) && plan.capabilities.length) rows.push(["功能", plan.capabilities.join("、")]);
        if (Array.isArray(plan.packages) && plan.packages.length) rows.push(["驱动包", plan.packages.join("、")]);
        if (Array.isArray(plan.wiring) && plan.wiring.length) rows.push(["接线", plan.wiring.map((w) => `${w.role}→${w.pin}`).join("，")]);
        const list = card.querySelector(".plan-list");
        for (const [label, value] of rows) {
          const li = document.createElement("li");
          const b = document.createElement("span"); b.className = "plan-k"; b.textContent = label + "：";
          li.appendChild(b); li.appendChild(document.createTextNode(value));
          list.appendChild(li);
        }
        // Honest cost framing: this is the estimate for THIS build step only, shown
        // alongside what the session has already consumed and what's left — so "~N
        // credits" isn't misread as the whole session's cost.
        const remaining = parseInt($("qUsed").textContent, 10);
        const est = Number(plan.estimate) || 0;
        const used = (lastDailyGrant > 0 && Number.isFinite(remaining)) ? lastDailyGrant - remaining : null;
        let costText = `本步预计 ~${est} credits`;
        if (used != null) costText += `｜本次会话已用 ${used}`;
        if (Number.isFinite(remaining)) costText += `｜剩余 ${remaining}`;
        card.querySelector(".plan-cost").textContent = costText;
        let answered = false;
        const reviseInput = card.querySelector(".plan-revise");
        const reply = (answer, feedback) => {
          if (answered) return;
          answered = true;
          vscode.postMessage({ type: "ui_prompt_response", promptId, answer, feedback });
          card.querySelectorAll(".ask-opt, .ask-send").forEach((b) => { b.disabled = true; });
          reviseInput.disabled = true;
          awaitingUser = false; markActivity();
          if (answer === "cancel") { setStatus("Cancelled"); return; }
          setStatus("thinking…");
          // Revise re-runs the agent to re-plan; confirm proceeds to codegen.
          setPending(answer === "revise" ? "正在按你的修改重新规划…" : "正在生成代码…");
        };
        // Revise: send the user's free-text change request back so the agent re-plans
        // and the host re-shows an updated plan. Empty input is a no-op.
        const submitRevise = () => {
          const fb = reviseInput.value.trim();
          if (!fb) { reviseInput.focus(); return; }
          reply("revise", fb);
        };
        card.querySelector(".plan-go").addEventListener("click", () => reply("confirm"));
        card.querySelector(".plan-cancel").addEventListener("click", () => reply("cancel"));
        card.querySelector(".plan-edit").addEventListener("click", submitRevise);
        reviseInput.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); submitRevise(); } });
        $("activity").appendChild(card);
        $("activity").parentElement.scrollTop = $("activity").parentElement.scrollHeight;
      }

      // ----- deploy checkpoint (board connection + wiring, before install/flash) -----
      let currentDeployCard = null;
      function addDeployPrompt(promptId, manifest) {
        currentThink = null;
        clearPending();
        $("activityEmpty").classList.add("hidden");
        setTab("activity");
        setStatus("Confirm wiring & connection…");
        const card = document.createElement("div");
        card.className = "ev fade-in";
        card.innerHTML = '<div class="ev-card ask"><div class="ev-head">' +
          '<div class="ev-ico skill">•</div>' +
          '<div class="ev-main"><div class="ev-label"><span class="kind">deploy</span></div>' +
          '<div class="ev-sum">按下面的接线图连接好硬件，确认开发板已插入后再部署</div>' +
          '<div class="deploy-wiring"></div>' +
          '<div class="deploy-status">正在检测开发板…</div>' +
          '<div class="deploy-ports"></div>' +
          '<div class="ask-options"><button class="ask-opt deploy-go" type="button" disabled>部署</button><button class="ask-opt deploy-rescan" type="button">重新扫描</button><button class="ask-opt deploy-cancel" type="button">取消</button></div>' +
          "</div></div></div>";
        const wiring = wiringMarkup(manifest);
        if (wiring) card.querySelector(".deploy-wiring").innerHTML = wiring;
        const statusEl = card.querySelector(".deploy-status");
        const portsEl = card.querySelector(".deploy-ports");
        const goBtn = card.querySelector(".deploy-go");
        let answered = false;
        let selectedPort = null;
        const reply = (answer) => {
          if (answered) return;
          answered = true;
          // Carry the chosen port on the prompt response itself so the host sets it
          // before unblocking the agent — a separate select_device message races the
          // resolve and the first device tool can fire before the port lands.
          vscode.postMessage({ type: "ui_prompt_response", promptId, answer, port: answer === "confirm" ? selectedPort : null });
          card.querySelectorAll(".ask-opt").forEach((b) => { b.disabled = true; });
          currentDeployCard = null;
          awaitingUser = false; markActivity();
          setStatus(answer === "confirm" ? "Deploying…" : "Cancelled");
        };
        goBtn.addEventListener("click", () => reply("confirm"));
        card.querySelector(".deploy-cancel").addEventListener("click", () => reply("cancel"));
        card.querySelector(".deploy-rescan").addEventListener("click", () => { statusEl.textContent = "正在检测开发板…"; vscode.postMessage({ type: "deploy_rescan" }); });
        // Updated by deploy_ports_updated: no board -> Deploy stays disabled; one
        // board -> auto-selected; several -> the user picks one before deploying.
        currentDeployCard = {
          setPorts: (ports) => {
            ports = Array.isArray(ports) ? ports : [];
            portsEl.innerHTML = "";
            if (!ports.length) {
              statusEl.textContent = "未检测到开发板，请连接后点击“重新扫描”";
              selectedPort = null; goBtn.disabled = true; return;
            }
            if (ports.length === 1) {
              selectedPort = ports[0];
              statusEl.textContent = "已连接：" + ports[0];
            } else {
              statusEl.textContent = "检测到多个设备，请选择：";
              selectedPort = null;
              ports.forEach((p) => {
                const b = document.createElement("button");
                b.className = "ask-opt"; b.type = "button"; b.textContent = p;
                b.addEventListener("click", () => {
                  selectedPort = p;
                  portsEl.querySelectorAll(".ask-opt").forEach((x) => x.classList.remove("chosen"));
                  b.classList.add("chosen"); goBtn.disabled = false;
                });
                portsEl.appendChild(b);
              });
            }
            goBtn.disabled = selectedPort == null;
          },
        };
        $("activity").appendChild(card);
        $("activity").parentElement.scrollTop = $("activity").parentElement.scrollHeight;
        vscode.postMessage({ type: "deploy_rescan" });
      }

      // ----- Code (streamed live into the activity feed) -----
      // No separate Code tab: codegen streams into the activity feed as a growing
      // block, then lands as a real .py file in the workspace (opened in the editor).
      function codeRowsInto(host, code) {
        host.innerHTML = "";
        highlightLines(code.replace(/\n$/, "")).forEach((toks, i) => {
          const row = document.createElement("div"); row.className = "code-row";
          const gut = document.createElement("div"); gut.className = "code-gut"; gut.textContent = String(i + 1);
          const src = document.createElement("div"); src.className = "code-src";
          toks.forEach((t) => { const s = document.createElement("span"); if (t.cls) s.className = t.cls; s.textContent = t.text; src.appendChild(s); });
          row.append(gut, src); host.appendChild(row);
        });
      }
      // Append a codegen token to the open code card, or open a new one (one card
      // per file — multi-file projects get a card each).
      function streamCodeDelta(text, path) {
        clearPending();
        const file = path || "main.py";
        const scroll = () => { const w = $("activity").parentElement; w.scrollTop = w.scrollHeight; };
        if (currentCode && currentCode.path === file) { currentCode.raw += text; currentCode.pre.textContent = currentCode.raw; currentCode.card.__code = currentCode.raw; scroll(); return; }
        currentThink = null; // a code stream closes any open thinking card
        $("activityEmpty").classList.add("hidden");
        const card = document.createElement("div");
        card.className = "ev fade-in";
        // Code card: filename + Copy header, then the code body (raw <pre> while
        // streaming, swapped for highlighted line-numbered rows on finalize).
        card.innerHTML = '<div class="ev-card code-card"><div class="code-card-head">' +
          '<span class="code-file"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M14 3v5h5" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg><span class="code-name"></span></span>' +
          '<button class="code-copy" type="button">Copy</button>' +
          '</div><div class="ev-code"><pre class="code-pre"></pre></div></div>';
        card.querySelector(".code-name").textContent = file;
        const pre = card.querySelector(".code-pre");
        pre.textContent = text;
        card.__code = text; // full source for the Copy button (survives finalize)
        const copyBtn = card.querySelector(".code-copy");
        copyBtn.addEventListener("click", () => {
          vscode.postMessage({ type: "copy_code", text: card.__code || "" });
          copyBtn.textContent = "已复制"; copyBtn.classList.add("done");
          setTimeout(() => { copyBtn.textContent = "Copy"; copyBtn.classList.remove("done"); }, 1500);
        });
        $("activity").appendChild(card);
        currentCode = { card, pre, raw: text, path: file };
        scroll();
      }
      // Finalize the open code card: swap the raw stream for syntax-highlighted,
      // line-numbered rows. Handles a code_updated with no preceding deltas.
      function finalizeCode(code, path) {
        const file = path || "main.py";
        if (!currentCode || currentCode.path !== file) streamCodeDelta("", file);
        if (!currentCode) return;
        currentCode.card.__code = code; // Copy uses the finalized source
        const block = document.createElement("div");
        block.className = "code-block";
        codeRowsInto(block, code);
        currentCode.pre.replaceWith(block);
        currentCode = null;
      }

      // ----- Serial -----
      function serialClass(line) {
        if (/^MPY:|MicroPython|\[boot\]/.test(line)) return "boot";
        if (/\bi2c\b|0x[0-9a-f]{2}|SSD1306|AHT|found/i.test(line)) return "i2c";
        if (/alert|warn|>|threshold|ON\b/i.test(line)) return "alert";
        if (/ok|complete|ready|MPYHW_READY/i.test(line)) return "ok";
        return "";
      }
      function addSerial(lines) {
        $("serialEmpty").classList.add("hidden");
        $("serialFilled").classList.remove("hidden");
        $("serialHead").classList.add("live");
        const host = $("serial");
        (lines || []).forEach((line) => {
          const row = document.createElement("div"); row.className = "serial-line " + serialClass(line);
          const txt = document.createElement("span"); txt.className = "txt"; txt.textContent = line;
          row.appendChild(txt); host.appendChild(row);
        });
        host.parentElement.scrollTop = host.parentElement.scrollHeight;
        markNew("serial");
        // live pulse on the Serial tab
        const tabBtn = document.querySelector('.tab[data-tab="serial"]');
        if (tabBtn && !tabBtn.querySelector(".pulse")) { const p = document.createElement("span"); p.className = "pulse"; tabBtn.appendChild(p); }
      }

      // ----- Wiring (maps internal manifest → friendly component cards) -----
      const ROLE_MAP = {
        i2c_sda:    { signal: "Data (SDA)",   comp: "i2c", kind: "signal" },
        i2c_scl:    { signal: "Clock (SCL)",  comp: "i2c", kind: "signal" },
        i2c_power:  { signal: "Power 3V3",    comp: "i2c", kind: "power" },
        i2c_gnd:    { signal: "Ground",       comp: "i2c", kind: "ground" },
        led_anode:  { signal: "Anode (+)",    comp: "led", kind: "signal" },
        led_cathode:{ signal: "Cathode (–)",  comp: "led", kind: "ground" },
        button:     { signal: "Switch leg",   comp: "btn", kind: "signal" },
        button_gnd: { signal: "Ground",       comp: "btn", kind: "ground" },
      };
      const COMPONENTS = {
        i2c: { name: "I²C Sensor", part: "I²C bus device" },
        led: { name: "Status LED", part: "5mm + current-limit resistor" },
        btn: { name: "Button", part: "Momentary tactile" },
        other: { name: "Peripheral", part: "" },
      };
      function humanize(role) { return role.replace(/_/g, " ").replace(/\b\w/g, (c) => c.toUpperCase()); }
      function classifyRole(role) {
        if (/gnd|ground|cathode/i.test(role)) return "ground";
        if (/3v3|vcc|vbus|vsys|power|5v/i.test(role)) return "power";
        return "signal";
      }
      // Friendly labels for bus connection pins in the rich (LLM) wiring shape.
      const BUS_SIGNAL = { sda: "Data (SDA)", scl: "Clock (SCL)", mosi: "Data (MOSI)", miso: "Data (MISO)",
        sck: "Clock (SCK)", cs: "Chip select (CS)", tx: "TX", rx: "RX", power: "Power 3V3", vcc: "Power 3V3", gnd: "Ground" };
      // The offline pipeline emits a flat [{role,pin}] array; the live LLM emits a
      // richer bus-keyed object ({ i2c: { sda, scl, devices:[{address,label}] } }),
      // which can show several devices sharing one bus. Render both shapes.
      function buildComponents(manifest) {
        const wiring = manifest && manifest.wiring;
        if (Array.isArray(wiring)) {
          const byComp = {};
          for (const w of wiring) {
            const map = ROLE_MAP[w.role] || { signal: humanize(w.role), comp: "other", kind: classifyRole(w.role) };
            (byComp[map.comp] = byComp[map.comp] || []).push({ signal: map.signal, kind: map.kind, pin: w.pin });
          }
          return Object.keys(byComp).map((k) => ({ key: k, ...(COMPONENTS[k] || COMPONENTS.other), pins: byComp[k] }));
        }
        if (wiring && typeof wiring === "object") {
          const comps = [];
          for (const [bus, spec] of Object.entries(wiring)) {
            if (!spec || typeof spec !== "object") continue;
            const pins = [];
            for (const [k, v] of Object.entries(spec)) {
              if (k === "devices" || v == null || typeof v === "object") continue;
              pins.push({ signal: BUS_SIGNAL[k.toLowerCase()] || humanize(k), kind: classifyRole(k), pin: String(v) });
            }
            const busLabel = bus.toUpperCase();
            const devices = Array.isArray(spec.devices) ? spec.devices : [];
            if (devices.length) {
              for (const d of devices) {
                comps.push({ key: bus, name: (d && d.label) || (busLabel + " device"), part: (d && d.address) ? (busLabel + " · " + d.address) : (busLabel + " bus"), pins });
              }
            } else {
              comps.push({ key: bus, name: busLabel + " bus", part: "", pins });
            }
          }
          return comps;
        }
        return [];
      }
      function driverFor(comp, manifest) {
        const refs = (manifest && manifest.driver_context_refs) || [];
        if (comp.key === "led") return "GPIO out";
        const ref = refs.find((r) => !/machine_pin_led/.test(r));
        return ref ? ref.split("@")[0] : "";
      }
      // Build the wiring diagram HTML from a manifest ("" if none). Shared by the
      // Wiring tab and the deploy checkpoint card so both show the same diagram.
      function wiringMarkup(manifest) {
        let comps;
        try { comps = buildComponents(manifest); }
        catch (e) { console.error("wiringMarkup: unrecognized manifest.wiring shape", e); comps = []; }
        if (!comps.length) return "";
        const boardName = (manifest && manifest.board_id) ? manifest.board_id : "Target board";
        let html = '<div class="wiring"><div class="wire-board">' +
          "<span><b>" + esc(boardName) + "</b> · " + comps.length + " component" + (comps.length > 1 ? "s" : "") + "</span></div>";
        for (const c of comps) {
          const drv = driverFor(c, manifest);
          html += '<div class="comp-card fade-in"><div class="comp-top">' +
            '<div class="comp-ico"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="6" y="6" width="12" height="12" rx="2" stroke="currentColor" stroke-width="2"/></svg></div>' +
            '<div class="comp-meta"><div class="comp-name">' + esc(c.name) + '</div><div class="comp-part">' + esc(c.part) + "</div></div>" +
            (drv ? '<div class="comp-driver">' + esc(drv) + "</div>" : "") + "</div><div class=\"comp-pins\">";
          for (const p of c.pins) {
            const badgeCls = "pin-badge" + (p.kind === "power" ? " power" : p.kind === "ground" ? " ground" : "");
            html += '<div class="pin-row"><span class="pin-dot ' + p.kind + '"></span>' +
              '<span class="pin-sig">' + esc(p.signal) + '</span><span class="' + badgeCls + '">' + esc(p.pin) + "</span></div>";
          }
          html += "</div></div>";
        }
        if (comps.some((c) => c.key === "led")) html += '<div class="wire-note">⚠ LED needs a current-limiting resistor (≈220–330Ω).</div>';
        html += "</div>";
        return html;
      }
      function renderWiring(manifest) {
        const html = wiringMarkup(manifest);
        const host = $("wiring");
        if (!html) { $("wiringEmpty").classList.remove("hidden"); host.innerHTML = ""; return; }
        $("wiringEmpty").classList.add("hidden");
        host.innerHTML = html;
        markNew("wiring");
      }
      function esc(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

      // ----- credits -----
      let lastDailyGrant = 0;
      function setCredits(balance, dailyGrant) {
        if (dailyGrant > 0) lastDailyGrant = dailyGrant;
        $("qUsed").textContent = balance;
        const max = dailyGrant > 0 ? dailyGrant : balance;
        const pct = max > 0 ? Math.min(100, Math.round((balance / max) * 100)) : 0;
        $("qFill").style.width = pct + "%";
        const q = $("quota"); q.classList.remove("hidden", "low", "exhausted");
        if (balance <= 0) q.classList.add("exhausted");
        else if (balance <= Math.max(1, Math.round(max * 0.2))) q.classList.add("low");
        quotaExhausted = balance <= 0;
        updateGenerateEnabled();
      }

      // ----- host messages (protocol unchanged) -----
      window.addEventListener("message", (event) => {
        const msg = event.data;
        if (msg.type === "session_event" && msg.event && msg.event.kind === "credits") {
          setCredits(msg.event.balance, msg.event.dailyGrant);
        }
        if (msg.type === "trace_event") {
          markActivity();
          const t = msg.event && typeof msg.event.text === "string" ? msg.event.text.trim() : "";
          if (PHASE_LABELS.has(t)) currentPhase = t;        // a known tool phase
          else if (t) currentPhase = "thinking";               // streamed reasoning text
          tickHeartbeat();                                  // repaint the label now, don't wait up to 1s
          // Process narration (reasoning + phase labels) is intentionally NOT shown
          // as feed cards — only the status line above + spinner reflect progress.
          // The model's final reply arrives separately as a "summary" message.
        }
        if (msg.type === "summary") { markActivity(); addSummary(msg.text); }
        if (msg.type === "ui_prompt_needed") { awaitingUser = true; pauseTimer(); addAskPrompt(msg.promptId, msg.question, msg.options); }
        if (msg.type === "plan_needed") { awaitingUser = true; pauseTimer(); addPlanPrompt(msg.promptId, msg.plan); }
        if (msg.type === "deploy_needed") { awaitingUser = true; pauseTimer(); addDeployPrompt(msg.promptId, msg.manifest); }
        if (msg.type === "deploy_ports_updated") { if (currentDeployCard) currentDeployCard.setPorts(msg.ports); }
        if (msg.type === "code_delta") { markActivity(); streamCodeDelta(msg.text, msg.path); }
        if (msg.type === "code_updated") { markActivity(); finalizeCode(msg.code, msg.path); }
        if (msg.type === "manifest_updated") { markActivity(); renderWiring(msg.manifest); }
        if (msg.type === "serial_output") { markActivity(); addSerial(msg.lines); }
        if (msg.type === "device_selected") { markActivity(); addActivity({ type: "trace", text: "Device selected: " + msg.port }); }
        if (msg.type === "files_written") { markActivity(); addActivity({ type: "trace", text: "Generated files written: " + (msg.paths || []).join(", ") }); }
        if (msg.type === "files_write_failed") { markActivity(); addActivity({ type: "trace", text: "Generated files not written: " + msg.error }); }
        if (msg.type === "session_error") {
          const FRIENDLY_ERR = {
            out_of_credits: "Out of credits — resets at midnight UTC",
            sign_in_required: "Sign in with GitHub to start",
            auth_provider_unavailable: "VS Code GitHub auth is unavailable",
            github_session_failed: "GitHub sign-in did not complete in VS Code",
            github_session_unavailable: "Sign in with GitHub to start",
            github_token_exchange_failed: "GitHub sign-in reached the API, but token exchange failed",
            github_token_exchange_unreachable: "Cannot reach the auth API",
            github_token_missing: "Auth API returned no session token",
          };
          const text = FRIENDLY_ERR[msg.error] || msg.error;
          if (msg.error === "out_of_credits") { quotaExhausted = true; $("quota").classList.add("exhausted"); updateGenerateEnabled(); }
          addActivity({ text }); setStatus(text, "error");
        }
        if (msg.type === "session_done") {
          setRunning(false);
          currentThink = null;
          currentCode = null;
          clearPending();
          // A still-open deploy card is now stale (its prompt was resolved by the
          // session ending); disable its buttons so clicks can't post stale replies.
          if (currentDeployCard) { document.querySelectorAll(".deploy-go, .deploy-rescan, .deploy-cancel").forEach((b) => { b.disabled = true; }); currentDeployCard = null; }
          $("serialHead").classList.remove("live");
          document.querySelectorAll(".tab .pulse").forEach((p) => p.remove());
          const t = String(msg.terminal);
          const ok = t === "generated" || t === "success";
          const FRIENDLY = {
            generated: "Done", success: "Done", cancelled: "Stopped",
            awaiting_user: "Waiting for your reply",
            max_turns: "Stopped (max turns)",
            repair_exhausted: "Couldn't get it working", session_error: "Error",
          };
          const isError = !ok && t !== "cancelled" && t !== "awaiting_user";
          setStatus(FRIENDLY[t] || t, isError ? "error" : null);
          if (isError) addActivity({ text: "Session ended: " + (FRIENDLY[t] || t) });
        }
      });

      // Pull the real device list + credit balance from the extension host on load.
      vscode.postMessage({ type: "request_boards" });
    </script>
  </body>
</html>
