# Pins pytest rootdir + sys.path to this directory so `from serve import ...` in
# test_shim.py resolves even when pytest is invoked from the repo root (CI cds in,
# but this makes a root-level run work too). Markers mirror mpyhw-api so the
# timing/subprocess tests are deselectable with `-m "not slow"` etc.
[tool.pytest.ini_options]
pythonpath = ["."]
addopts = "--strict-markers --strict-config"
markers = [
    "slow: timing-sensitive or otherwise slow test",
    "serial: needs pyserial / a real serial port",
    "subprocess: spawns a real child process",
]
