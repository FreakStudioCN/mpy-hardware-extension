# Publish the Blockless VS Code extension to the Visual Studio Marketplace.
#
# Manual-run only (use the "Run pipeline" button). Auth is via Microsoft Entra
# workload identity federation — NO PAT, no long-lived secret. Prerequisites:
#   - service connection 'blockless-vsce-publish' (Workload Identity Federation)
#   - its managed identity added as Contributor on the 'blockless' Marketplace
#     publisher
# See docs/vscode-extension-publish-flow.md for the full setup.

trigger: none
pr: none

pool:
  vmImage: ubuntu-latest

variables:
  # The Azure DevOps service connection created in step 1.3.
  azureServiceConnection: blockless-vsce-publish

steps:
  # vscode:prepublish vendors files from the repo-root MicroPython_Skills submodule.
  - checkout: self
    submodules: false

  # GraftSense upstream commits a corrupt symlink blob (a 12KB file stored with
  # mode 120000); creating it as a real symlink fails on Linux with ENAMETOOLONG.
  # core.symlinks=false materializes it as a plain file — matching the Windows
  # checkout the committed content was generated from.
  - script: |
      git config --global core.symlinks false
      git submodule update --init --recursive
    displayName: Check out submodules without symlinks

  - task: NodeTool@0
    inputs:
      versionSpec: "22.x"
    displayName: Use Node.js

  - script: npm ci
    workingDirectory: mpy-hardware-extension
    displayName: Install extension dependencies

  - script: npm test
    workingDirectory: mpy-hardware-extension
    displayName: Run tests

  - script: npm run typecheck
    workingDirectory: mpy-hardware-extension
    displayName: Typecheck

  - script: npm run package
    workingDirectory: mpy-hardware-extension
    displayName: Package VSIX

  - task: AzureCLI@2
    displayName: Publish to Visual Studio Marketplace
    inputs:
      azureSubscription: $(azureServiceConnection)
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        cd mpy-hardware-extension
        npx vsce publish --azure-credential
