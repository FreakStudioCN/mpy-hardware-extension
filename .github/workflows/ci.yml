name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

# A newer push to the same ref supersedes in-flight runs — don't burn minutes on stale commits.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: nothing here needs to write to the repo. Publishing uses a PAT
# (secrets.VSCE_PAT), not the workflow GITHUB_TOKEN, so read is sufficient.
permissions:
  contents: read

jobs:
  extension:
    name: extension (node + cross-process)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: mpy-hardware-extension
    # The e2e smoke test spawns the real API, which now requires Postgres.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mpyhw_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mpyhw_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mpyhw_test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      # GraftSense upstream commits a corrupt symlink blob (a 12KB file stored with
      # mode 120000); creating it as a real symlink fails on Linux with ENAMETOOLONG.
      # core.symlinks=false materializes it as a plain file — matching the Windows
      # checkout the committed content was generated from.
      - name: Check out submodules without symlinks
        run: |
          git config --global core.symlinks false
          git submodule update --init --recursive
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mpy-hardware-extension/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: mpyhw-api/requirements.txt
      # The shim round-trip and the agent-loop<->API e2e spawn real Python; install
      # the API deps so they RUN. MPYHW_REQUIRE_CONTRACT_TESTS makes a missing
      # interpreter/golden/DB a HARD FAILURE instead of a silent skip.
      - name: Install API deps (for the e2e smoke test)
        run: pip install -r ../mpyhw-api/requirements.txt
      - run: npm ci
      - run: npm run build
      - name: Test
        run: npm test
        env:
          MPYHW_REQUIRE_CONTRACT_TESTS: "1"

  api:
    name: api + device-shim (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mpyhw_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mpyhw_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mpyhw_test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      # GraftSense upstream commits a corrupt symlink blob (a 12KB file stored with
      # mode 120000); creating it as a real symlink fails on Linux with ENAMETOOLONG.
      # core.symlinks=false materializes it as a plain file — matching the Windows
      # checkout the committed content was generated from.
      - name: Check out submodules without symlinks
        run: |
          git config --global core.symlinks false
          git submodule update --init --recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            mpyhw-api/requirements.txt
            mpy-hardware-extension/python/shim/requirements.txt
      - name: Install API deps
        run: pip install -r mpyhw-api/requirements.txt
      - name: Test API
        run: python -m pytest
        working-directory: mpyhw-api
      - name: Install device-shim deps
        run: pip install -r mpy-hardware-extension/python/shim/requirements.txt
      - name: Test device shim
        run: python -m pytest
        working-directory: mpy-hardware-extension/python/shim

  content-freshness:
    name: content freshness (regen drift)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      # GraftSense upstream commits a corrupt symlink blob (a 12KB file stored with
      # mode 120000); creating it as a real symlink fails on Linux with ENAMETOOLONG.
      # core.symlinks=false materializes it as a plain file — matching the Windows
      # checkout the committed content was generated from.
      - name: Check out submodules without symlinks
        run: |
          git config --global core.symlinks false
          git submodule update --init --recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: mpyhw-api/requirements.txt
      - name: Install API deps
        run: pip install -r mpyhw-api/requirements.txt
      # Deterministic re-ingest from the pinned GraftSense submodule. If the
      # committed catalog drifted (hand-edited content, stale submodule pin, or a
      # non-deterministic generator) the regen differs and this fails. Schema
      # validity of every committed context is covered by the api job's pytest.
      - name: Re-ingest GraftSense from the pinned submodule
        working-directory: mpyhw-api
        run: python scripts/ingest_graftsense.py --repo-dir ../third_party/GraftSense-Drivers-MicroPython --output-dir content/packages
      - name: Fail if committed content drifted
        run: |
          git diff --exit-code -- mpyhw-api/content/packages
          status="$(git status --porcelain --untracked-files=all -- mpyhw-api/content/packages)"
          if [ -n "$status" ]; then
            echo "$status"
            exit 1
          fi

  publish-extension:
    name: publish extension to Marketplace
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [extension]
    # Only on a version tag push (e.g. v0.3.0). vsce publishes the package.json
    # version. Tag pushes require repo write access, so fork PRs can't reach the
    # VSCE_PAT secret. See docs/vscode-extension-publish-flow.md.
    if: startsWith(github.ref, 'refs/tags/v')
    defaults:
      run:
        working-directory: mpy-hardware-extension
    steps:
      # vscode:prepublish vendors files from the repo-root skills submodule.
      - uses: actions/checkout@v4
        with:
          submodules: false
      # GraftSense upstream commits a corrupt symlink blob (a 12KB file stored with
      # mode 120000); creating it as a real symlink fails on Linux with ENAMETOOLONG.
      # core.symlinks=false materializes it as a plain file — matching the Windows
      # checkout the committed content was generated from.
      - name: Check out submodules without symlinks
        run: |
          git config --global core.symlinks false
          git submodule update --init --recursive
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mpy-hardware-extension/package-lock.json
      - run: npm ci
      - name: Publish
        run: npx @vscode/vsce publish -p "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
