services:
  - type: web
    name: blockless-api
    runtime: docker
    plan: starter
    region: virginia
    dockerfilePath: mpyhw-api/Dockerfile
    dockerContext: .
    healthCheckPath: /v1/health/ready
    envVars:
      - key: PORT
        value: "8080"
      # Load-bearing: the circuit breaker (_deepseek_breaker) and the per-user LLM
      # session limiter (llm_sessions) are in-process state. More than one worker
      # would give each its own copy, silently breaking rate-limiting and the
      # upstream-outage breaker. Scaling out requires moving that state to the DB.
      - key: WEB_CONCURRENCY
        value: "1"
      - key: MPYHW_ENV
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: blockless-db
          property: connectionString
      - key: MPYHW_JWT_SECRET
        generateValue: true
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: MPYHW_ADMIN_TOKEN
        sync: false

databases:
  - name: blockless-db
    databaseName: mpyhw
    user: mpyhw
    plan: basic-256mb
    region: virginia
